<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1.0,user-scalable=no"/>
  <title>Kitchen 3D Viewer</title>
  <style>
    *{margin:0;padding:0;box-sizing:border-box}
    html,body{width:100%;height:100%;overflow:hidden;background:#050508}
    canvas{display:block;width:100% !important;height:100% !important;cursor:grab}
    canvas.grabbing{cursor:grabbing}

    /* Loading overlay */
    #loader{
      position:fixed;inset:0;
      display:flex;flex-direction:column;align-items:center;justify-content:center;
      background:#050508;z-index:200;transition:opacity .5s
    }
    #loader.out{opacity:0;pointer-events:none}
    .ring{
      width:44px;height:44px;
      border:2px solid rgba(99,102,241,.18);
      border-top-color:#6366f1;
      border-radius:50%;
      animation:spin .85s linear infinite
    }
    @keyframes spin{to{transform:rotate(360deg)}}
    .lt{color:#6366f1;font:700 10px system-ui;letter-spacing:.1em;text-transform:uppercase;margin-top:14px}
    .ls{color:rgba(255,255,255,.28);font:400 10px system-ui;margin-top:5px}

    /* Vignette */
    #vig{
      position:fixed;inset:0;
      background:radial-gradient(ellipse at center,transparent 42%,rgba(0,0,0,.68) 100%);
      pointer-events:none;z-index:10
    }

    /* HUD corner brackets */
    .brk{position:fixed;width:20px;height:20px;pointer-events:none;z-index:20;opacity:.45}
    .tl{top:10px;left:10px;border-top:2px solid #6366f1;border-left:2px solid #6366f1}
    .tr{top:10px;right:10px;border-top:2px solid #6366f1;border-right:2px solid #6366f1}
    .bl{bottom:42px;left:10px;border-bottom:2px solid #6366f1;border-left:2px solid #6366f1}
    .br{bottom:42px;right:10px;border-bottom:2px solid #6366f1;border-right:2px solid #6366f1}

    /* Hint badge */
    #hint{
      position:fixed;top:12px;left:50%;transform:translateX(-50%);
      display:flex;align-items:center;gap:6px;
      background:rgba(0,0,0,.62);backdrop-filter:blur(10px);
      border:1px solid rgba(255,255,255,.1);
      color:#fff;font:600 10px system-ui;
      padding:5px 13px;border-radius:20px;
      white-space:nowrap;pointer-events:none;z-index:30;
      transition:opacity 1.2s
    }
    #hint.out{opacity:0}
    .dot{width:6px;height:6px;border-radius:50%;background:#6366f1;animation:dp 1.6s ease-in-out infinite;flex-shrink:0}
    @keyframes dp{0%,100%{opacity:1}50%{opacity:.25}}

    /* FOV label */
    #fovl{
      position:fixed;top:42px;left:50%;transform:translateX(-50%);
      color:rgba(255,255,255,.26);font:500 9px monospace;
      letter-spacing:.06em;pointer-events:none;z-index:30
    }

    /* 360° badge */
    #b360{
      position:fixed;bottom:10px;right:12px;
      color:rgba(255,255,255,.2);font:600 9px monospace;
      letter-spacing:.12em;pointer-events:none;z-index:30
    }

    /* Zoom strip */
    #zs{
      position:fixed;right:12px;top:50%;transform:translateY(-50%);
      display:flex;flex-direction:column;gap:5px;z-index:30
    }
    .zb{
      width:28px;height:28px;border-radius:50%;
      background:rgba(255,255,255,.09);border:1px solid rgba(255,255,255,.16);
      color:#fff;font:700 16px system-ui;cursor:pointer;
      display:flex;align-items:center;justify-content:center;
      transition:background .18s;user-select:none
    }
    .zb:hover{background:rgba(255,255,255,.22)}

    /* Bottom bar */
    #bar{
      position:fixed;bottom:10px;left:50%;transform:translateX(-50%);
      display:flex;align-items:center;gap:6px;z-index:30
    }
    .btn{
      display:inline-flex;align-items:center;gap:5px;
      background:rgba(255,255,255,.09);backdrop-filter:blur(10px);
      border:1px solid rgba(255,255,255,.16);color:#fff;
      font:600 10px system-ui;padding:6px 13px;border-radius:18px;
      cursor:pointer;transition:background .18s;white-space:nowrap
    }
    .btn:hover{background:rgba(255,255,255,.2)}
    .btn svg{width:11px;height:11px;flex-shrink:0}
    #arb{display:none}
    #arb.show{display:inline-flex}
  </style>
</head>
<body>

<div id="loader">
  <div class="ring"></div>
  <p class="lt">3D Kitchen View</p>
  <p class="ls">Waiting for scene…</p>
</div>

<canvas id="c"></canvas>
<div id="vig"></div>
<div class="brk tl"></div><div class="brk tr"></div>
<div class="brk bl"></div><div class="brk br"></div>

<div id="hint"><span class="dot"></span>Drag to look around · Scroll/pinch to zoom · Double-click to reset</div>
<div id="fovl">FOV 75°</div>
<div id="b360">3D</div>

<div id="zs">
  <div class="zb" id="zi">+</div>
  <div class="zb" id="zo">−</div>
</div>

<div id="bar">
  <button class="btn" id="rst">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2">
      <path d="M1 4v6h6M23 20v-6h-6"/>
      <path d="M20.49 9A9 9 0 0 0 5.64 5.64L1 10m22 4-4.64 4.36A9 9 0 0 1 3.51 15"/>
    </svg>Reset
  </button>
  <button class="btn" id="fsbtn">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2">
      <path d="M8 3H5a2 2 0 0 0-2 2v3m18 0V5a2 2 0 0 0-2-2h-3m0 18h3a2 2 0 0 0 2-2v-3M3 16v3a2 2 0 0 0 2 2h3"/>
    </svg>Fullscreen
  </button>
  <button class="btn" id="arb">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2">
      <path d="M5 3H3a2 2 0 0 0-2 2v2M19 3h2a2 2 0 0 1 2 2v2M5 21H3a2 2 0 0 1-2-2v-2M19 21h2a2 2 0 0 0 2-2v-2"/>
      <path d="M12 8l-4 2.3V16l4 2.3L16 16v-5.7L12 8z"/>
    </svg>View in AR
  </button>
</div>

<!-- ═══ Pure WebGL 360° viewer — zero CDN dependencies ═══════════════════ -->
<script>
(function () {
  'use strict';

  /* ── WebGL context ─────────────────────────────────────────────────────── */
  var canvas = document.getElementById('c');
  var gl = canvas.getContext('webgl') || canvas.getContext('experimental-webgl');
  if (!gl) {
    document.querySelector('.ls').textContent = 'WebGL not available';
    return;
  }

  /* ── Shaders ───────────────────────────────────────────────────────────── */
  var VS = [
    'attribute vec3 aP;',
    'attribute vec2 aU;',
    'uniform mat4 uPr;',
    'uniform mat4 uVw;',
    'varying vec2 vU;',
    'void main(){',
    '  gl_Position = uPr * uVw * vec4(aP,1.0);',
    '  vU = aU;',
    '}'
  ].join('\n');

  var FS = [
    'precision highp float;',
    'uniform sampler2D uT;',
    'uniform float uB;',       /* brightness 0→1 for fade-in */
    'varying vec2 vU;',
    'void main(){',
    '  vec4 c = texture2D(uT, vU);',
    '  gl_FragColor = vec4(c.rgb * uB, 1.0);',
    '}'
  ].join('\n');

  function mkShader(type, src) {
    var s = gl.createShader(type);
    gl.shaderSource(s, src);
    gl.compileShader(s);
    if (!gl.getShaderParameter(s, gl.COMPILE_STATUS)) {
      console.error('[ar] shader:', gl.getShaderInfoLog(s));
      return null;
    }
    return s;
  }
  var prog = gl.createProgram();
  gl.attachShader(prog, mkShader(gl.VERTEX_SHADER,   VS));
  gl.attachShader(prog, mkShader(gl.FRAGMENT_SHADER, FS));
  gl.linkProgram(prog);
  if (!gl.getProgramParameter(prog, gl.LINK_STATUS)) {
    console.error('[ar] link:', gl.getProgramInfoLog(prog));
    return;
  }
  gl.useProgram(prog);

  var locP  = gl.getAttribLocation( prog, 'aP');
  var locU  = gl.getAttribLocation( prog, 'aU');
  var locPr = gl.getUniformLocation(prog, 'uPr');
  var locVw = gl.getUniformLocation(prog, 'uVw');
  var locT  = gl.getUniformLocation(prog, 'uT');
  var locB  = gl.getUniformLocation(prog, 'uB');

  /* ── Flat quad geometry — image displayed on a large plane wall ─────────
   *
   * The AI generates a wide-angle perspective photograph, NOT an equirectangular
   * panorama. Mapping it onto a sphere warps it (fisheye / barrel distortion).
   * The correct display: a large flat rectangle in front of the camera.
   * Dragging rotates the camera's view direction → natural "look around" with
   * zero distortion, as if you're standing inside the kitchen looking at the wall.
   *
   * Camera sits at origin (0,0,0) looking toward −Z (center of image).
   * Image quad sits at z = −DIST, width×height preserving 3:2 source aspect.
   * ──────────────────────────────────────────────────────────────────────── */
  var DIST   = 500;    /* distance from camera to image wall   */
  var QUAD_W = 2400;   /* wall width  — 1.5× height for 3:2   */
  var QUAD_H = 1600;   /* wall height (QUAD_W / 1.5)           */
  var HW = QUAD_W / 2, HH = QUAD_H / 2;

  /*
   * UV convention: WebGL uploads image row-0 (top of image) → V=0.
   * Vertices at +Y (top of world) get V=0  → top of image.  ✓
   * Vertices at −Y (bottom)       get V=1  → bottom of image. ✓
   */
  var posData = [
    -HW,  HH, -DIST,   /* 0 top-left     */
     HW,  HH, -DIST,   /* 1 top-right    */
    -HW, -HH, -DIST,   /* 2 bottom-left  */
     HW, -HH, -DIST    /* 3 bottom-right */
  ];
  var uvData = [
    0, 0,              /* 0 → (left, top)     */
    1, 0,              /* 1 → (right, top)    */
    0, 1,              /* 2 → (left, bottom)  */
    1, 1               /* 3 → (right, bottom) */
  ];
  var idxData = [0, 2, 1,  1, 2, 3];   /* two counter-clockwise triangles */

  var vbP = gl.createBuffer();
  gl.bindBuffer(gl.ARRAY_BUFFER, vbP);
  gl.bufferData(gl.ARRAY_BUFFER, new Float32Array(posData), gl.STATIC_DRAW);

  var vbU = gl.createBuffer();
  gl.bindBuffer(gl.ARRAY_BUFFER, vbU);
  gl.bufferData(gl.ARRAY_BUFFER, new Float32Array(uvData), gl.STATIC_DRAW);

  var ib = gl.createBuffer();
  gl.bindBuffer(gl.ELEMENT_ARRAY_BUFFER, ib);
  gl.bufferData(gl.ELEMENT_ARRAY_BUFFER, new Uint16Array(idxData), gl.STATIC_DRAW);
  var idxCount = idxData.length;

  /* ── Placeholder texture (dark background) ─────────────────────────────── */
  var tex = gl.createTexture();
  gl.bindTexture(gl.TEXTURE_2D, tex);
  gl.texImage2D(gl.TEXTURE_2D, 0, gl.RGBA, 1, 1, 0, gl.RGBA, gl.UNSIGNED_BYTE,
    new Uint8Array([5, 5, 15, 255]));
  gl.texParameteri(gl.TEXTURE_2D, gl.TEXTURE_MIN_FILTER, gl.LINEAR);
  gl.texParameteri(gl.TEXTURE_2D, gl.TEXTURE_MAG_FILTER, gl.LINEAR);
  gl.texParameteri(gl.TEXTURE_2D, gl.TEXTURE_WRAP_S, gl.CLAMP_TO_EDGE);
  gl.texParameteri(gl.TEXTURE_2D, gl.TEXTURE_WRAP_T, gl.CLAMP_TO_EDGE);

  /* ── Matrix helpers ─────────────────────────────────────────────────────── */
  /* Perspective matrix (column-major for WebGL) */
  function mkProj(fovRad, aspect, near, far) {
    var f = 1.0 / Math.tan(fovRad / 2);
    return new Float32Array([
      f / aspect, 0,  0,                            0,
      0,          f,  0,                            0,
      0,          0,  (far + near) / (near - far), -1,
      0,          0,  (2 * far * near) / (near - far), 0
    ]);
  }

  /*
   * View matrix from yaw (Y-axis) and pitch (X-axis).
   * At yaw=−π/2, pitch=0 the camera looks toward +X world space,
   * which corresponds to U=0.5 in the equirectangular image (front of scene).
   * Column-major storage for WebGL.
   *
   * Rotation: Ry(yaw) * Rx(pitch), then transposed for view matrix.
   * cy=cos(yaw), sy=sin(yaw), cp=cos(pitch), sp=sin(pitch)
   *
   * V = [  cy,    sp*sy,  cp*sy,  0 ]
   *     [  0,     cp,    -sp,     0 ]
   *     [ -sy,    sp*cy,  cp*cy,  0 ]
   *     [  0,     0,      0,      1 ]
   */
  function mkView(yaw, pitch) {
    var cy = Math.cos(yaw),  sy = Math.sin(yaw);
    var cp = Math.cos(pitch), sp = Math.sin(pitch);
    return new Float32Array([
       cy,    sp * sy,  cp * sy,  0,
       0,     cp,      -sp,       0,
      -sy,    sp * cy,  cp * cy,  0,
       0,     0,        0,        1
    ]);
  }

  /* ── Camera state ───────────────────────────────────────────────────────── */
  var yaw   = 0;     /* 0 = look straight at image centre           */
  var pitch = 0;
  var fovDeg = 75;
  /*
   * Pan limits for flat image: prevent camera rotating past the quad edges.
   * At DIST=500 and QUAD_W=2400: atan(1200/500) ≈ 67° max reach.
   * Limit to 50° so edges stay off-screen (natural room feel).
   */
  var MAX_YAW   =  0.87;   /* ~50° left/right  */
  var MAX_PITCH =  0.55;   /* ~31° up/down     */
  var velYaw   = 0;        /* no auto-rotate for flat image */
  var velPitch = 0;
  var dragging = false;
  var lastX = 0, lastY = 0;
  var bright = 0, brightTarget = 0;  /* fade-in when image loads */
  var imageLoaded = false;

  /* ── Canvas resize ──────────────────────────────────────────────────────── */
  function resize() {
    canvas.width  = window.innerWidth;
    canvas.height = window.innerHeight;
    gl.viewport(0, 0, canvas.width, canvas.height);
  }
  resize();
  window.addEventListener('resize', resize);

  /* ── Render loop ────────────────────────────────────────────────────────── */
  function tick() {
    requestAnimationFrame(tick);

    /* Apply momentum — clamp both axes (flat image, no wrap-around) */
    if (!dragging) {
      velYaw   *= 0.88;
      velPitch *= 0.88;
    }
    yaw   += velYaw;
    pitch += velPitch;
    yaw   = Math.max(-MAX_YAW,   Math.min(MAX_YAW,   yaw));
    pitch = Math.max(-MAX_PITCH, Math.min(MAX_PITCH, pitch));

    /* Brightness fade-in */
    bright += (brightTarget - bright) * 0.05;

    gl.clearColor(0.02, 0.02, 0.06, 1);
    gl.clear(gl.COLOR_BUFFER_BIT | gl.DEPTH_BUFFER_BIT);
    gl.enable(gl.DEPTH_TEST);
    gl.disable(gl.CULL_FACE);    /* render both sides of sphere */

    var W = canvas.width, H = canvas.height;
    gl.uniformMatrix4fv(locPr, false, mkProj(fovDeg * Math.PI / 180, W / H, 0.1, 1100));
    gl.uniformMatrix4fv(locVw, false, mkView(yaw, pitch));
    gl.uniform1i(locT, 0);
    gl.uniform1f(locB, bright);

    gl.bindBuffer(gl.ARRAY_BUFFER, vbP);
    gl.enableVertexAttribArray(locP);
    gl.vertexAttribPointer(locP, 3, gl.FLOAT, false, 0, 0);

    gl.bindBuffer(gl.ARRAY_BUFFER, vbU);
    gl.enableVertexAttribArray(locU);
    gl.vertexAttribPointer(locU, 2, gl.FLOAT, false, 0, 0);

    gl.bindBuffer(gl.ELEMENT_ARRAY_BUFFER, ib);
    gl.activeTexture(gl.TEXTURE0);
    gl.bindTexture(gl.TEXTURE_2D, tex);
    gl.drawElements(gl.TRIANGLES, idxCount, gl.UNSIGNED_SHORT, 0);
  }
  tick();

  /* ── Load kitchen render as flat-wall texture ───────────────────────────── */
  function loadPanorama(src) {
    if (imageLoaded) return;
    imageLoaded = true;

    document.querySelector('.ls').textContent = 'Loading image…';

    var img = new Image();
    img.onload = function () {
      gl.bindTexture(gl.TEXTURE_2D, tex);
      /* Upload texture — non-POT safe: use LINEAR + CLAMP_TO_EDGE (no mipmaps) */
      gl.texImage2D(gl.TEXTURE_2D, 0, gl.RGBA, gl.RGBA, gl.UNSIGNED_BYTE, img);
      gl.texParameteri(gl.TEXTURE_2D, gl.TEXTURE_MIN_FILTER, gl.LINEAR);
      gl.texParameteri(gl.TEXTURE_2D, gl.TEXTURE_MAG_FILTER, gl.LINEAR);
      gl.texParameteri(gl.TEXTURE_2D, gl.TEXTURE_WRAP_S, gl.CLAMP_TO_EDGE);
      gl.texParameteri(gl.TEXTURE_2D, gl.TEXTURE_WRAP_T, gl.CLAMP_TO_EDGE);

      brightTarget = 1.12;   /* slight boost */

      /* Fade out loader */
      var el = document.getElementById('loader');
      if (el) { el.classList.add('out'); setTimeout(function () { el.remove(); }, 600); }

      /* Auto-hide hint after 5 s */
      setTimeout(function () {
        var h = document.getElementById('hint');
        if (h) h.classList.add('out');
      }, 5000);
    };
    img.onerror = function () {
      imageLoaded = false;   /* allow retry */
      document.querySelector('.ls').textContent = 'Image failed to load';
    };
    /* data: URLs don't need crossOrigin — setting it causes errors */
    if (src.startsWith('http')) img.crossOrigin = 'anonymous';
    img.src = src;
  }

  /* ── postMessage from parent React component ────────────────────────────── */
  window.addEventListener('message', function (e) {
    if (e.data && e.data.type === 'LOAD_IMAGE' && e.data.src) {
      loadPanorama(e.data.src);
    }
  });

  /*
   * VIEWER_READY handshake — tells the parent that this script has executed
   * and the message listener is registered. The parent holds the image and
   * will respond with LOAD_IMAGE as soon as it receives this signal.
   *
   * This is synchronous (no CDN loading), so it fires < 1 ms after page load.
   */
  try { window.parent.postMessage({ type: 'VIEWER_READY' }, '*'); } catch (_) {}

  /* ── Mouse ──────────────────────────────────────────────────────────────── */
  canvas.addEventListener('mousedown', function (e) {
    dragging = true;
    lastX = e.clientX; lastY = e.clientY;
    velYaw = 0; velPitch = 0;
    canvas.classList.add('grabbing');
  });
  window.addEventListener('mousemove', function (e) {
    if (!dragging) return;
    var dx = e.clientX - lastX, dy = e.clientY - lastY;
    lastX = e.clientX; lastY = e.clientY;
    velYaw   = dx * 0.005;
    velPitch = dy * 0.005;
    yaw   += velYaw;
    pitch += velPitch;
    pitch  = Math.max(-Math.PI * 0.44, Math.min(Math.PI * 0.44, pitch));
  });
  window.addEventListener('mouseup', function () {
    dragging = false;
    canvas.classList.remove('grabbing');
  });

  canvas.addEventListener('dblclick', resetView);

  /* ── Scroll zoom ────────────────────────────────────────────────────────── */
  canvas.addEventListener('wheel', function (e) {
    e.preventDefault();
    fovDeg = Math.max(28, Math.min(110, fovDeg + e.deltaY * 0.04));
    updateFovLabel();
  }, { passive: false });

  /* ── Touch ──────────────────────────────────────────────────────────────── */
  var pinchD0 = 0;
  canvas.addEventListener('touchstart', function (e) {
    if (e.touches.length === 1) {
      dragging = true;
      lastX = e.touches[0].clientX; lastY = e.touches[0].clientY;
      velYaw = 0; velPitch = 0;
    } else if (e.touches.length === 2) {
      dragging = false;
      pinchD0 = Math.hypot(
        e.touches[0].clientX - e.touches[1].clientX,
        e.touches[0].clientY - e.touches[1].clientY
      );
    }
  }, { passive: true });

  canvas.addEventListener('touchmove', function (e) {
    e.preventDefault();
    if (e.touches.length === 1 && dragging) {
      var dx = e.touches[0].clientX - lastX, dy = e.touches[0].clientY - lastY;
      lastX = e.touches[0].clientX; lastY = e.touches[0].clientY;
      velYaw   = dx * 0.007;
      velPitch = dy * 0.007;
      yaw   += velYaw;
      pitch += velPitch;
      pitch  = Math.max(-Math.PI * 0.44, Math.min(Math.PI * 0.44, pitch));
    } else if (e.touches.length === 2 && pinchD0 > 0) {
      var d = Math.hypot(
        e.touches[0].clientX - e.touches[1].clientX,
        e.touches[0].clientY - e.touches[1].clientY
      );
      fovDeg = Math.max(28, Math.min(110, fovDeg * (pinchD0 / d)));
      pinchD0 = d;
      updateFovLabel();
    }
  }, { passive: false });

  canvas.addEventListener('touchend', function () { dragging = false; pinchD0 = 0; }, { passive: true });

  /* ── Helpers ────────────────────────────────────────────────────────────── */
  function updateFovLabel() {
    var el = document.getElementById('fovl');
    if (el) el.textContent = 'FOV ' + Math.round(fovDeg) + '\u00b0';
  }

  function resetView() {
    yaw = 0; pitch = 0; fovDeg = 75;
    velYaw = 0; velPitch = 0;
    updateFovLabel();
  }

  document.getElementById('zi').addEventListener('click', function () {
    fovDeg = Math.max(28, fovDeg - 12); updateFovLabel();
  });
  document.getElementById('zo').addEventListener('click', function () {
    fovDeg = Math.min(110, fovDeg + 12); updateFovLabel();
  });
  document.getElementById('rst').addEventListener('click', resetView);
  document.getElementById('fsbtn').addEventListener('click', function () {
    if (!document.fullscreenElement) {
      document.documentElement.requestFullscreen().catch(function () {});
    } else {
      document.exitFullscreen().catch(function () {});
    }
  });

  /* ── WebXR AR (shown only when device supports immersive-ar) ─────────── */
  if (navigator.xr) {
    navigator.xr.isSessionSupported('immersive-ar').then(function (ok) {
      if (!ok) return;
      var btn = document.getElementById('arb');
      if (btn) btn.classList.add('show');
      btn.addEventListener('click', function () {
        navigator.xr.requestSession('immersive-ar', {
          requiredFeatures: ['hit-test'],
          optionalFeatures: ['dom-overlay'],
          domOverlay: { root: document.body }
        }).catch(function (err) {
          console.warn('[ar-viewer] AR session failed:', err);
        });
      });
    }).catch(function () {});
  }

}());
</script>
</body>
</html>
